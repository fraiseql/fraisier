# Fraisier Configuration — Django + Celery + PostgreSQL
#
# Two fraises: an API (Django + gunicorn) and a worker (Celery).
# Both deploy to bare metal with atomic migration + rollback.

fraises:
  api:
    type: api
    description: Django REST API (gunicorn)
    environments:
      development:
        name: myapp-api-dev
        branch: dev
        app_path: /var/www/myapp-dev
        systemd_service: gunicorn-myapp-dev.service
        database:
          name: myapp_dev
          strategy: rebuild
        health_check:
          url: http://localhost:8000/health
          timeout: 30

      production:
        name: myapp-api
        branch: main
        app_path: /var/www/myapp
        systemd_service: gunicorn-myapp.service
        database:
          name: myapp_production
          strategy: migrate
          backup_before_deploy: true
          hooks:
            backup:
              enabled: true
              backup_dir: /var/backups/fraisier
              database_url: "${DATABASE_URL}"
              compress: true
              max_backups: 10
            audit:
              enabled: true
              database_url: "${DATABASE_URL}"
              signing_key: "${AUDIT_SIGNING_KEY}"
              environment: production
            slack:
              enabled: true
              webhook_url: "${SLACK_WEBHOOK_URL}"
              channel: "#deployments"
              mention_on_failure: "@engineering"
            discord:
              enabled: false
              webhook_url: "${DISCORD_WEBHOOK_URL}"
              mention_on_failure: "@engineering"
            email:
              enabled: false
              smtp_server: "smtp.gmail.com"
              smtp_port: 587
              smtp_username: "${SMTP_USER}"
              smtp_password: "${SMTP_PASSWORD}"
              from_email: "fraisier@yourdomain.com"
              to_emails: ["team@yourdomain.com", "devops@yourdomain.com"]
              subject_prefix: "[Production Deploy]"
        health_check:
          url: http://localhost:8000/health
          timeout: 30

  worker:
    type: api
    description: Celery worker
    environments:
      development:
        name: myapp-worker-dev
        branch: dev
        app_path: /var/www/myapp-dev
        systemd_service: celery-myapp-dev.service

      production:
        name: myapp-worker
        branch: main
        app_path: /var/www/myapp
        systemd_service: celery-myapp.service
        health_check:
          url: http://localhost:8001/health
          timeout: 30

environments:
  development:
    server: dev.example.com
  production:
    server: prod.example.com

branch_mapping:
  dev:
    fraise: api
    environment: development
  main:
    fraise: api
    environment: production
