name: Python Version Matrix Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: python-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-matrix:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fraisier
          POSTGRES_PASSWORD: fraisier
          POSTGRES_DB: fraisier_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install dependencies
      run: |
        uv venv
        uv pip install ".[dev]"

    - name: Verify environment
      run: |
        uv run python --version
        pg_isready -h localhost -p 5432 -U fraisier && echo 'PostgreSQL ready' || echo 'PostgreSQL not ready'

    - name: Run tests with coverage
      env:
        FRAISIER_TEST_PG_URL: postgresql://fraisier:fraisier@localhost:5432/fraisier_test
      run: |
        uv run pytest tests/ \
          --cov=fraisier \
          --cov-report=xml \
          --cov-report=term-missing \
          -v \
          --tb=short

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./coverage.xml
        flags: python-${{ matrix.python-version }}
        name: Python-${{ matrix.python-version }}
        fail_ci_if_error: false
      continue-on-error: true

  matrix-summary:
    name: Python Version Matrix Summary
    runs-on: ubuntu-latest
    needs: [test-matrix]
    if: always()

    steps:
      - name: Check matrix results
        run: |
          if [[ "${{ needs.test-matrix.result }}" == "success" ]]; then
            echo "Python 3.11+ tests passed"
            exit 0
          else
            echo "Python version testing failed"
            exit 1
          fi
